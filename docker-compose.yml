version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: ${VITE_API_BASE:-http://localhost:8000/api/v1}
    ports:
      - "5173:80"
    environment:
      - VITE_API_BASE=${VITE_API_BASE:-http://localhost:8000/api/v1}
    depends_on:
      - api
    restart: unless-stopped
