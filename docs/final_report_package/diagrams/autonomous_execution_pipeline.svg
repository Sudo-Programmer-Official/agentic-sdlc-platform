<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <style>.box{fill:#f8fafc;stroke:#0f172a;stroke-width:2;rx:10;ry:10}.t{font:14px Arial;fill:#0f172a}.h{font:700 20px Arial;fill:#0f172a}.l{stroke:#334155;stroke-width:2;marker-end:url(#a);fill:none}</style>
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#334155"/></marker></defs>
  <text class="h" x="40" y="40">Diagram 2 - Autonomous Execution Pipeline</text>
  <rect class="box" x="60" y="90" width="190" height="60"/><text class="t" x="90" y="126">Requirement Intake</text>
  <rect class="box" x="290" y="90" width="140" height="60"/><text class="t" x="332" y="126">Planning</text>
  <rect class="box" x="470" y="90" width="190" height="60"/><text class="t" x="494" y="126">Task Decomposition</text>
  <rect class="box" x="700" y="90" width="170" height="60"/><text class="t" x="724" y="126">Context Assembly</text>
  <rect class="box" x="910" y="90" width="140" height="60"/><text class="t" x="938" y="126">WRITE_TESTS</text>
  <rect class="box" x="1090" y="90" width="130" height="60"/><text class="t" x="1120" y="126">WRITE_CODE</text>
  <rect class="box" x="1240" y="90" width="120" height="60"/><text class="t" x="1254" y="126">REVIEW_DIFF</text>
  <rect class="box" x="1090" y="210" width="130" height="60"/><text class="t" x="1123" y="246">RUN_TESTS</text>
  <rect class="box" x="860" y="210" width="190" height="60"/><text class="t" x="890" y="246">Validation Gate</text>
  <rect class="box" x="620" y="210" width="200" height="60"/><text class="t" x="646" y="246">Recovery Loop</text>
  <rect class="box" x="390" y="210" width="190" height="60"/><text class="t" x="430" y="246">Recovery Checkpoint</text>
  <rect class="box" x="160" y="210" width="190" height="60"/><text class="t" x="182" y="246">Delivery / Output</text>
  <text class="t" x="620" y="320">Bounded retries enforced by runtime policy and budget limits.</text>
  <text class="t" x="620" y="346">Validation gates control progression to delivery.</text>

  <line class="l" x1="250" y1="120" x2="290" y2="120"/><line class="l" x1="430" y1="120" x2="470" y2="120"/>
  <line class="l" x1="660" y1="120" x2="700" y2="120"/><line class="l" x1="870" y1="120" x2="910" y2="120"/>
  <line class="l" x1="1050" y1="120" x2="1090" y2="120"/><line class="l" x1="1220" y1="120" x2="1240" y2="120"/>
