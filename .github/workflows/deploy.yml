name: Deploy to ECS

on:
  push:
    branches:
      - main

env:
  AWS_REGION: us-east-1
  ECR_ACCOUNT: 495849799931.dkr.ecr.us-east-1.amazonaws.com
  ECR_WEB_REPO: agentic-sdlc-web
  ECR_API_REPO: agentic-sdlc-api
  ECS_CLUSTER: agentic-sdlc-cluster
  ECS_WEB_SERVICE: agentic-web-service
  ECS_API_SERVICE: agentic-api-service
  VITE_API_BASE: https://api.prompt2pr.com/api/v1

jobs:
  deploy-web:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::495849799931:role/github-oidc-ecr-ecs
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Docker image
        run: |
          IMAGE=${ECR_ACCOUNT}/${ECR_WEB_REPO}
          TAG=${{ github.sha }}
          docker build \
            --build-arg VITE_API_BASE=${VITE_API_BASE} \
            -t $IMAGE:$TAG \
            -t $IMAGE:latest \
            -f apps/web/Dockerfile apps/web
          docker push $IMAGE:$TAG
          docker push $IMAGE:latest

      - name: Update ECS Service
        run: |
          aws ecs update-service \
            --cluster ${ECS_CLUSTER} \
            --service ${ECS_WEB_SERVICE} \
            --force-new-deployment

  deploy-api:
    runs-on: ubuntu-latest
    needs: deploy-web

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::495849799931:role/github-oidc-ecr-ecs
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push API image
        run: |
          IMAGE=${ECR_ACCOUNT}/${ECR_API_REPO}
          TAG=${{ github.sha }}
          docker build \
            --platform linux/amd64 \
            -t $IMAGE:$TAG \
            -t $IMAGE:latest \
            -f apps/api/Dockerfile .
          docker push $IMAGE:$TAG
          docker push $IMAGE:latest

      - name: Update ECS API Service
        run: |
          aws ecs update-service \
            --cluster ${ECS_CLUSTER} \
            --service ${ECS_API_SERVICE} \
            --force-new-deployment
