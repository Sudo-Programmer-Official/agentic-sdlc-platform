name: Deploy to ECS

on:
  push:
    branches:
      - main

env:
  AWS_REGION: us-east-1
  ECR_ACCOUNT: 495849799931.dkr.ecr.us-east-1.amazonaws.com
  ECR_WEB_REPO: agentic-sdlc-web
  ECR_API_REPO: agentic-sdlc-api
  ECS_CLUSTER: agentic-sdlc-cluster
  ECS_WEB_SERVICE: agentic-web-service
  ECS_API_SERVICE: agentic-api-service
  VITE_API_BASE: https://api.prompt2pr.com/api/v1

jobs:
  deploy-web:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::495849799931:role/github-oidc-ecr-ecs
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Docker image
        run: |
          IMAGE=${ECR_ACCOUNT}/${ECR_WEB_REPO}
          TAG=${{ github.sha }}
          docker build \
            --build-arg VITE_API_BASE=${VITE_API_BASE} \
            -t $IMAGE:$TAG \
            -t $IMAGE:latest \
            -f apps/web/Dockerfile apps/web
          docker push $IMAGE:$TAG
          docker push $IMAGE:latest

      - name: Update ECS Service
        run: |
          aws ecs update-service \
            --cluster ${ECS_CLUSTER} \
            --service ${ECS_WEB_SERVICE} \
            --force-new-deployment

  deploy-api:
    runs-on: ubuntu-latest
    needs: deploy-web

    permissions:
      actions: read
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate build metadata
        id: build_meta
        env:
          BUILD_VERSION: build-${{ github.run_number }}.${{ github.run_attempt }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 <<'PY'
          import json
          import os
          import subprocess
          import urllib.parse
          import urllib.request
          from pathlib import Path

          build_at = subprocess.check_output(
              ["date", "-u", "+%Y-%m-%dT%H:%M:%SZ"], text=True
          ).strip()
          build_title = subprocess.check_output(
              ["git", "log", "-1", "--pretty=%s"], text=True
          ).strip()

          current = {
              "version": os.environ["BUILD_VERSION"],
              "sha": os.environ["GITHUB_SHA"],
              "short_sha": os.environ["GITHUB_SHA"][:7],
              "branch": os.environ["GITHUB_REF_NAME"],
              "built_at": build_at,
              "run_number": int(os.environ["GITHUB_RUN_NUMBER"]),
              "run_attempt": int(os.environ["GITHUB_RUN_ATTEMPT"]),
              "run_url": f"{os.environ['GITHUB_SERVER_URL']}/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{os.environ['GITHUB_RUN_ID']}",
              "title": build_title or os.environ["GITHUB_SHA"][:7],
          }

          history = []
          try:
              api_url = (
                  f"{os.environ['GITHUB_API_URL']}/repos/{os.environ['GITHUB_REPOSITORY']}"
                  f"/actions/workflows/deploy.yml/runs?branch="
                  f"{urllib.parse.quote(os.environ['GITHUB_REF_NAME'])}&per_page=20&status=completed"
              )
              request = urllib.request.Request(
                  api_url,
                  headers={
                      "Authorization": f"Bearer {os.environ['GITHUB_TOKEN']}",
                      "Accept": "application/vnd.github+json",
                      "X-GitHub-Api-Version": "2022-11-28",
                  },
              )
              with urllib.request.urlopen(request) as response:
                  payload = json.load(response)
              for run in payload.get("workflow_runs", []):
                  if run.get("conclusion") != "success":
                      continue
                  head_sha = run.get("head_sha") or ""
                  history.append(
                      {
                          "version": f"build-{run['run_number']}.{run['run_attempt']}",
                          "sha": head_sha,
                          "short_sha": head_sha[:7] if head_sha else None,
                          "branch": run.get("head_branch"),
                          "built_at": run.get("updated_at"),
                          "run_number": run.get("run_number"),
                          "run_attempt": run.get("run_attempt"),
                          "run_url": run.get("html_url"),
                          "title": run.get("display_title"),
                      }
                  )
          except Exception as exc:
              print(f"Warning: unable to fetch workflow history: {exc}")

          merged = [current]
          for entry in history:
              if entry["version"] == current["version"]:
                  continue
              merged.append(entry)
              if len(merged) >= 10:
                  break

          metadata_dir = Path("apps/api/app/metadata")
          metadata_dir.mkdir(parents=True, exist_ok=True)
          (metadata_dir / "build_history.json").write_text(
              json.dumps({"current": current, "history": merged}, indent=2) + "\n",
              encoding="utf-8",
          )

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"build_version={current['version']}\n")
              fh.write(f"build_at={current['built_at']}\n")
              fh.write(f"build_run_url={current['run_url']}\n")
              fh.write(f"build_title={current['title']}\n")
          PY

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::495849799931:role/github-oidc-ecr-ecs
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push API image
        env:
          BUILD_VERSION: ${{ steps.build_meta.outputs.build_version }}
          BUILD_SHA: ${{ github.sha }}
          BUILD_BRANCH: ${{ github.ref_name }}
          BUILD_AT: ${{ steps.build_meta.outputs.build_at }}
          BUILD_RUN_NUMBER: ${{ github.run_number }}
          BUILD_RUN_ATTEMPT: ${{ github.run_attempt }}
          BUILD_RUN_URL: ${{ steps.build_meta.outputs.build_run_url }}
          BUILD_TITLE: ${{ steps.build_meta.outputs.build_title }}
        run: |
          IMAGE=${ECR_ACCOUNT}/${ECR_API_REPO}
          TAG=${{ github.sha }}
          docker build \
            --platform linux/amd64 \
            --build-arg BUILD_VERSION="$BUILD_VERSION" \
            --build-arg BUILD_SHA="$BUILD_SHA" \
            --build-arg BUILD_BRANCH="$BUILD_BRANCH" \
            --build-arg BUILD_AT="$BUILD_AT" \
            --build-arg BUILD_RUN_NUMBER="$BUILD_RUN_NUMBER" \
            --build-arg BUILD_RUN_ATTEMPT="$BUILD_RUN_ATTEMPT" \
            --build-arg BUILD_RUN_URL="$BUILD_RUN_URL" \
            --build-arg BUILD_TITLE="$BUILD_TITLE" \
            -t "$IMAGE:$TAG" \
            -t "$IMAGE:latest" \
            -f apps/api/Dockerfile .
          docker push "$IMAGE:$TAG"
          docker push "$IMAGE:latest"

      - name: Update ECS API Service
        run: |
          aws ecs update-service \
            --cluster ${ECS_CLUSTER} \
            --service ${ECS_API_SERVICE} \
            --force-new-deployment
