name: Deploy to ECS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::495849799931:role/github-oidc-ecr-ecs
          aws-region: us-east-1

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Docker image
        run: |
          IMAGE=495849799931.dkr.ecr.us-east-1.amazonaws.com/agentic-sdlc-web
          TAG=${{ github.sha }}
          docker build -t $IMAGE:$TAG -t $IMAGE:latest -f apps/web/Dockerfile apps/web
          docker push $IMAGE:$TAG
          docker push $IMAGE:latest

      - name: Update ECS Service
        run: |
          aws ecs update-service \
            --cluster agentic-sdlc-cluster \
            --service agentic-web-service \
            --force-new-deployment
