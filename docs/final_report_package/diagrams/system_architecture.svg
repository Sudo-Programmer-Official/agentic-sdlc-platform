<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980">
  <style>
    .box { fill:#f8fafc; stroke:#0f172a; stroke-width:2; rx:12; ry:12; }
    .title { font: 700 20px Arial; fill:#0f172a; }
    .text { font: 14px Arial; fill:#0f172a; }
    .line { stroke:#334155; stroke-width:2; marker-end:url(#arrow); fill:none; }
  </style>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#334155"/></marker></defs>
  <text x="40" y="40" class="title">Diagram 1 - Overall System Architecture (Governed End-to-End Flow)</text>
  <rect class="box" x="60" y="90" width="180" height="70"/><text class="text" x="95" y="132">User Interface</text>
  <rect class="box" x="290" y="90" width="180" height="70"/><text class="text" x="336" y="132">API Layer</text>
  <rect class="box" x="520" y="90" width="240" height="70"/><text class="text" x="550" y="132">Scheduler / Orchestrator</text>

  <rect class="box" x="820" y="220" width="170" height="70"/><text class="text" x="860" y="262">Planner Agent</text>
  <rect class="box" x="1020" y="220" width="210" height="70"/><text class="text" x="1052" y="262">Code Generation Agent</text>
  <rect class="box" x="1260" y="220" width="150" height="70"/><text class="text" x="1296" y="262">Test Agent</text>
  <rect class="box" x="820" y="320" width="170" height="70"/><text class="text" x="860" y="362">Review Agent</text>

  <rect class="box" x="520" y="320" width="230" height="70"/><text class="text" x="548" y="362">Runtime Recovery Layer</text>

