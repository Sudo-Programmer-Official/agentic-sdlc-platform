  <rect class="box" x="560" y="500" width="180" height="70"/><text class="text" x="598" y="542">Git Repository</text>
  <rect class="box" x="780" y="500" width="240" height="70"/><text class="text" x="810" y="542">Database / Metrics Store</text>
  <rect class="box" x="1060" y="500" width="240" height="70"/><text class="text" x="1088" y="542">Knowledge and Memory Layer</text>

