<svg width="1440" height="920" viewBox="0 0 1440 920" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgDash" x1="80" y1="60" x2="1360" y2="860" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0C152C"/>
      <stop offset="1" stop-color="#13213B"/>
    </linearGradient>
    <linearGradient id="glowDash" x1="270" y1="140" x2="1150" y2="740" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#63D6F7" stop-opacity="0.26"/>
      <stop offset="0.5" stop-color="#52F6C8" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#F68A7D" stop-opacity="0.18"/>
    </linearGradient>
    <filter id="shadowDash" x="40" y="40" width="1360" height="840" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="26" stdDeviation="30" flood-color="#050B18" flood-opacity="0.48"/>
    </filter>
  </defs>

  <rect width="1440" height="920" rx="30" fill="url(#bgDash)"/>
  <rect x="60" y="84" width="1320" height="760" rx="34" fill="#0E182C" stroke="#2C496B" filter="url(#shadowDash)"/>
  <rect x="60" y="84" width="1320" height="760" rx="34" fill="url(#glowDash)" opacity="0.6"/>

  <text x="108" y="142" fill="#E9F2FF" font-family="Inter, Arial, sans-serif" font-size="44" font-weight="700">
    Mission Control Product Surface
  </text>
  <text x="108" y="180" fill="#9FB4D2" font-family="Inter, Arial, sans-serif" font-size="21">
    The operator sees the run honestly: plan, progress, commands, failures, review state, next action.
  </text>

  <rect x="104" y="224" width="516" height="110" rx="24" fill="#131F35" stroke="#355D88"/>
  <text x="132" y="262" fill="#C9DCF7" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">Run Header</text>
  <text x="132" y="296" fill="#EAF2FF" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700">Portfolio APP</text>
  <rect x="410" y="272" width="106" height="32" rx="16" fill="#4D292A"/>
  <text x="438" y="293" fill="#FFB3A0" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">FAILED</text>
  <text x="132" y="320" fill="#92A9C8" font-family="Inter, Arial, sans-serif" font-size="14">Project, executor, update time, branch, and run context</text>

  <rect x="644" y="224" width="292" height="110" rx="24" fill="#131F35" stroke="#355D88"/>
  <text x="672" y="262" fill="#C9DCF7" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">Current Step</text>
  <text x="672" y="293" fill="#EAF2FF" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">Confirm integration</text>
  <text x="672" y="317" fill="#92A9C8" font-family="Inter, Arial, sans-serif" font-size="14">Stage-aware execution state</text>

  <rect x="958" y="224" width="378" height="110" rx="24" fill="#131F35" stroke="#355D88"/>
  <text x="986" y="262" fill="#C9DCF7" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">Working Context</text>
  <rect x="986" y="280" width="96" height="26" rx="13" fill="#153653"/>
  <text x="1008" y="298" fill="#9DDEFF" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700">Repository</text>
  <rect x="1093" y="280" width="90" height="26" rx="13" fill="#173A39"/>
  <text x="1114" y="298" fill="#8CF2D3" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700">Validation</text>
  <rect x="1194" y="280" width="100" height="26" rx="13" fill="#4D292A"/>
  <text x="1217" y="298" fill="#FFB3A0" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700">Review State</text>

  <rect x="104" y="366" width="582" height="404" rx="28" fill="#121D31" stroke="#355D88"/>
  <text x="132" y="406" fill="#D5E5FD" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700">Run Plan</text>
  <rect x="132" y="434" width="526" height="110" rx="22" fill="#17253D" stroke="#294867"/>
  <text x="156" y="466" fill="#AFC3DF" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">Goal</text>
  <text x="156" y="496" fill="#EAF2FF" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">Create theme and dark / light mode</text>
  <text x="156" y="520" fill="#90A7C8" font-family="Inter, Arial, sans-serif" font-size="14">Expected files, validations, and confidence appear before execution.</text>

  <rect x="132" y="566" width="526" height="178" rx="22" fill="#17253D" stroke="#294867"/>
  <text x="156" y="598" fill="#AFC3DF" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">Task Decomposition</text>
  <rect x="156" y="618" width="470" height="38" rx="18" fill="#10192B" stroke="#28445F"/>
  <text x="176" y="643" fill="#EAF2FF" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">Analyze request</text>
  <rect x="156" y="668" width="470" height="38" rx="18" fill="#10192B" stroke="#28445F"/>
  <text x="176" y="693" fill="#EAF2FF" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">Apply patch</text>
  <rect x="156" y="718" width="470" height="38" rx="18" fill="#10192B" stroke="#28445F"/>
  <text x="176" y="743" fill="#EAF2FF" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">Run tests and review integration</text>

  <rect x="716" y="366" width="284" height="404" rx="28" fill="#121D31" stroke="#355D88"/>
  <text x="744" y="406" fill="#D5E5FD" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700">Reflections</text>
  <rect x="744" y="430" width="228" height="92" rx="20" fill="#17253D" stroke="#294867"/>
  <text x="764" y="460" fill="#EAF2FF" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">Blocked by upstream failure</text>
  <text x="764" y="485" fill="#90A7C8" font-family="Inter, Arial, sans-serif" font-size="13">Canceled because validation did not clear.</text>
  <rect x="744" y="538" width="228" height="92" rx="20" fill="#17253D" stroke="#294867"/>
  <text x="764" y="568" fill="#EAF2FF" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">What changed next</text>
  <text x="764" y="593" fill="#90A7C8" font-family="Inter, Arial, sans-serif" font-size="13">Next planned step and reasoning shown.</text>
  <rect x="744" y="646" width="228" height="92" rx="20" fill="#17253D" stroke="#294867"/>
  <text x="764" y="676" fill="#EAF2FF" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">Audit trail</text>
  <text x="764" y="701" fill="#90A7C8" font-family="Inter, Arial, sans-serif" font-size="13">Every meaningful run event can be surfaced.</text>

  <rect x="1028" y="366" width="308" height="188" rx="28" fill="#121D31" stroke="#355D88"/>
  <text x="1056" y="406" fill="#D5E5FD" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700">Failed Command</text>
  <rect x="1056" y="426" width="252" height="100" rx="20" fill="#0E1627" stroke="#294867"/>
  <text x="1076" y="454" fill="#FFB3A0" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">git apply --recount --check -</text>
  <text x="1076" y="482" fill="#95ACCB" font-family="Inter, Arial, sans-serif" font-size="13">warning: recount: unexpected line</text>
  <text x="1076" y="504" fill="#95ACCB" font-family="Inter, Arial, sans-serif" font-size="13">error: corrupt patch at line 27</text>

  <rect x="1028" y="582" width="308" height="188" rx="28" fill="#121D31" stroke="#355D88"/>
  <text x="1056" y="622" fill="#D5E5FD" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700">Operator Actions</text>
  <rect x="1056" y="646" width="110" height="34" rx="17" fill="#153653"/>
  <text x="1086" y="668" fill="#9DDEFF" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700">Inspect</text>
  <rect x="1178" y="646" width="110" height="34" rx="17" fill="#173A39"/>
  <text x="1203" y="668" fill="#8CF2D3" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700">Retry</text>
  <rect x="1056" y="692" width="110" height="34" rx="17" fill="#4D292A"/>
  <text x="1083" y="714" fill="#FFB3A0" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700">Narrow</text>
  <rect x="1178" y="692" width="110" height="34" rx="17" fill="#153653"/>
  <text x="1200" y="714" fill="#9DDEFF" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700">Approve</text>
</svg>
